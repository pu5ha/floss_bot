# News-first feed list (all fetch-tested 200 OK with recent items).
# Releases + Anitya were removed on purpose: this bot curates NEWS across
# privacy/rights, open hardware & products, FLOSS news, and crypto/security
# research — not software version bumps. Scoring is by topic RELEVANCE
# (embedding similarity to seeds/ground_truth.txt), not event type.
# Each feed: {name, url, layer, project?, tier?}
# Layers only feed advisory-detection + release-exclusion now, not the score.
feeds:
  # --- Privacy & digital rights (layer 3) ---
  - {name: "EFF Deeplinks", url: "https://www.eff.org/rss/updates.xml", layer: 3}
  - {name: "Access Now", url: "https://www.accessnow.org/feed/", layer: 3}
  - {name: "EDRi", url: "https://edri.org/feed/", layer: 3}
  - {name: "Privacy International", url: "https://privacyinternational.org/rss.xml", layer: 3}
